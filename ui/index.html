<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="mdt">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <div class="title">Los Santos Police Department</div>
          <div class="sub">Mobile Data Terminal</div>
        </div>
      </div>

      <div class="menu">
        <button class="item active" data-tab="dashboard">Dashboard</button>
        <button class="item" data-tab="citizens">Citizens</button>
        <button class="item" data-tab="vehicles">Vehicles</button>
        <button class="item" data-tab="warrants">Warrants</button>
        <button class="item" data-tab="bolos">BOLOs</button>
      </div>

      <div class="footer">
        <div id="userLine">Loading...</div>
        <button class="close" id="btnClose">Close</button>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="head">
          <h1 id="pageTitle">Dashboard</h1>
          <p class="desc">Overview of all activities</p>
        </div>
        <div class="search">
          <input id="searchInput" placeholder="Quick search citizen..." />
          <button id="btnSearch">Search</button>
        </div>
      </header>

      <section class="grid">
        <div class="card" id="cardMain">
          <div class="cardTitle">Citizen Results</div>
          <div class="list" id="citizenList">
            <div class="muted">Search a name to see results.</div>
          </div>
        </div>

        <div class="card">
          <div class="cardTitle">Recent Incidents</div>
          <div class="muted">Coming soon…</div>
        </div>

        <div class="card">
          <div class="cardTitle">Recent BOLOs</div>
          <div class="muted">Coming soon…</div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
